apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - certificate.yaml
  - hpa.yaml
  - pdb.yaml
  - servicemonitor.yaml

replacements:
  # app name → metadata.name e labels de seleção em todos os recursos
  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.name
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - metadata.name
          - spec.selector.matchLabels.[app.kubernetes.io/name]
          - spec.template.metadata.labels.[app.kubernetes.io/name]
      - select:
          kind: Service
        fieldPaths:
          - metadata.name
          - spec.selector.[app.kubernetes.io/name]
      - select:
          kind: HorizontalPodAutoscaler
        fieldPaths:
          - metadata.name
          - spec.scaleTargetRef.name
      - select:
          kind: PodDisruptionBudget
        fieldPaths:
          - metadata.name
          - spec.selector.matchLabels.[app.kubernetes.io/name]
      - select:
          kind: Ingress
        fieldPaths:
          - metadata.name
          - spec.rules.0.http.paths.0.backend.service.name
      - select:
          kind: ServiceMonitor
        fieldPaths:
          - metadata.name
          - spec.selector.matchLabels.[app.kubernetes.io/name]

  # hostname → Certificate (dnsNames) e Ingress (host + tls)
  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.hostname
    targets:
      - select:
          kind: Certificate
        fieldPaths:
          - spec.dnsNames.0
      - select:
          kind: Ingress
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
