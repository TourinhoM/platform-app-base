apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
      annotations:
        # Reloader: mudança em Secret/ConfigMap consumido (env.properties,
        # capability nova entregando db-conn/cache-conn) rola o pod sozinho —
        # sem bump manual de revisão nos templates day-2.
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: app-image
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            # OTEL — plataforma configura destino, app só instala o SDK
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://monitoring-tempo.monitoring.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)
          # Ganchos SEMPRE presentes e inertes (optional: true): edição day-2
          # nunca muda estrutura — env vira conteúdo de env.properties no
          # gitops repo; capabilities entregam Secrets com nomes fixos do
          # contrato (db-conn/cache-conn) que ligam sozinhos ao nascer.
          envFrom:
            - configMapRef:
                name: app-env
                optional: true
            - secretRef:
                name: db-conn
                optional: true
            - secretRef:
                name: cache-conn
                optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
