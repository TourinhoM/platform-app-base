apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay de teste — NÃO é deployado, não tem Application apontando pra ele.
# Existe só para o lint-k8s (CI) renderizar o Component, que não builda
# standalone (kind: Component só vira manifest quando incluído por um pai).
# Aqui ele é instanciado com valores dummy para validar a ESTRUTURA dos
# manifests (securityContext, probes, resources, etc.) uma única vez, na fonte
# — em vez de N vezes nos repos gitops-<app>, que só carregam valores.
#
# A claim AppNamespace de propósito NÃO entra: é per-app, não faz parte do
# app-base, e o schema do CRD platform.lab não está no catálogo do kubeconform.

components:
  - ../base

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - name=lint-fixture
      - hostname=lint-fixture.local

images:
  - name: app-image
    newName: ghcr.io/tourinho-labs/lint-fixture
    newTag: latest
