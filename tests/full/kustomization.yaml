apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay de teste (NÃO deployado) — composição completa: os 4 fragments.
# Valida a app totalmente exposta (workload + http + availability + metrics).
components:
  - ../../components/workload
  - ../../components/http
  - ../../components/availability
  - ../../components/metrics

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - name=lint-full
      - hostname=lint-full.local

images:
  - name: app-image
    newName: ghcr.io/tourinho-labs/lint-full
    newTag: latest
