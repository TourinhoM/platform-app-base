apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-tls
  labels:
    app.kubernetes.io/name: app
spec:
  secretName: app-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - placeholder.local
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
