apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Size MEDIUM — resources do container. Pareia com size=medium da AppNamespace
# Claim (quota cpu4/4Gi), com folga pra escalar réplicas.
patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
